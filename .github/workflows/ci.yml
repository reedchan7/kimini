name: CI

# Manual only — macOS runners burn Actions minutes; prefer local `make lint` /
# `make package-all` when the account has no quota.
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.target }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: fmt
        if: matrix.arch == 'aarch64'
        run: cargo fmt -- --check

      - name: clippy
        if: matrix.arch == 'aarch64'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        if: matrix.arch == 'aarch64'
        run: cargo test --all-targets --all-features

      - name: Install cargo-llvm-cov
        if: matrix.arch == 'aarch64'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: core coverage
        if: matrix.arch == 'aarch64'
        run: make coverage-core

      - name: build release apps
        run: |
          cargo build --release --bin kimini \
            --no-default-features --features native \
            --target ${{ matrix.target }}
          cargo build --release --bin kimini-web \
            --no-default-features --features legacy-web \
            --target ${{ matrix.target }}

      - name: package apps (smoke)
        run: |
          bash ./scripts/package-macos.sh \
            --app native \
            --skip-build \
            --target ${{ matrix.target }} \
            --arch ${{ matrix.arch }} \
            --zip
          bash ./scripts/package-macos.sh \
            --app web \
            --skip-build \
            --target ${{ matrix.target }} \
            --arch ${{ matrix.arch }} \
            --zip
          ls -lh dist/
          file "dist/Kimini.app/Contents/MacOS/kimini"
          file "dist/Kimini Web.app/Contents/MacOS/kimini-web"
